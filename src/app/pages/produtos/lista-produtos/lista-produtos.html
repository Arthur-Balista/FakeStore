<div class="container">

  <h1>Produtos</h1>

  <button class="btn-add" routerLink="/produtos/novo">
    + Incluir Produto
  </button>

  <input
    type="text"
    placeholder="Buscar produto..."
    [(ngModel)]="filtro"
    class="search"
  />

  <div class="grid">

    <div class="card" *ngFor="let p of produtosFiltrados">

      <img [src]="p.images[0]" />

      <h2>{{ p.title }}</h2>

      <p class="price">R$ {{ p.price }}</p>

      <div class="actions">

        <button
          class="btn-edit"
          routerLink="/produtos/editar">
          Editar
        </button>

        <button
          class="btn-delete"
          routerLink="/produtos/excluir">
          Excluir
        </button>

      </div>

    </div>

  </div>

</div>
